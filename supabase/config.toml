# Supabase project config. Currently scoped to Edge Function settings; extend
# with [db]/[auth]/[storage] blocks as other lanes need them.
project_id = "khlpidflnvkqafkvkpfy"

# --- Edge Functions ---------------------------------------------------------
# Authenticated functions verify the Supabase JWT at the gateway (default true),
# then re-verify + resolve the user in code via _shared/auth.ts.
[functions.connect-onboarding-link]
verify_jwt = true

# Permanent account deletion. A normal authenticated user call — the gateway
# verifies the JWT; the function re-verifies and then service-role-deletes the
# caller's own auth user (which cascades their DB rows). Needs no external keys.
[functions.delete-account]
verify_jwt = true

[functions.create-deposit-checkout]
verify_jwt = true

# Stripe calls the webhook with a Stripe signature, NOT a Supabase JWT — the
# gateway must let it through unauthenticated so our code can verify the
# signature itself.
[functions.stripe-webhook]
verify_jwt = false

# The agent runner is invoked by pg_cron (agent-run-drain) with the service-role
# key as the bearer, so the gateway must not require a user JWT; the function
# itself enforces the service-role bearer (see agent-run/index.ts).
[functions.agent-run]
verify_jwt = false

# The trust UI's approve/reject control — a normal authenticated artist call. The
# gateway verifies the JWT; the function re-resolves the owning artist in code.
[functions.approve-agent-action]
verify_jwt = true

# Meta's OAuth callback redirects the browser here with NO Supabase JWT — the
# gateway must let it through; the function authenticates the authorize-url /
# disconnect / refresh / status actions itself via requireUser(), and the
# callback leg via the signed `state` param instead (see instagram.ts).
[functions.instagram-oauth]
verify_jwt = false

# A normal authenticated artist call (start an import run).
[functions.instagram-import]
verify_jwt = true

# Studio Manager's deterministic scheduled jobs (deposit_chase, rebook_nudge,
# weekly_digest) — no ANTHROPIC_API_KEY dependency. Invoked by pg_cron
# (agent-scheduled-drain, 20260716090000) with the service-role key as the
# bearer, same pattern as agent-run.
[functions.agent-scheduled]
verify_jwt = false

# Multi-channel notification delivery (push + email). Invoked by pg_cron
# (notify-dispatch-drain, 20260717060000) with the shared runner bearer, same
# pattern as agent-run — so the gateway must not require a user JWT; the function
# enforces the runner bearer itself (see _shared/agent-auth.ts).
[functions.notify-dispatch]
verify_jwt = false

# Standalone Expo push sender (server-to-server; the runner bearer, not a user
# JWT). notify-dispatch is the queue path; this is for direct/manual sends.
[functions.send-push]
verify_jwt = false

# Standalone Resend email sender (server-to-server; the runner bearer). No-ops
# gracefully with no RESEND_API_KEY.
[functions.send-email]
verify_jwt = false

# AI image auto-tagging (image_tags + embeddings for discovery / match-
# inspiration / daily drop). Invoked by pg_cron (image-tag-drain, 20260717070000)
# with the AI-runtime bearer, same pattern as agent-run; the function enforces
# the bearer itself (see _shared/agent-auth.ts). Needs ANTHROPIC_API_KEY.
[functions.tag-image]
verify_jwt = false

# Daily personalized drop generator. Invoked once a day by pg_cron
# (daily-drop-generate, 20260717100000) with the AI-runtime bearer, same pattern
# as agent-scheduled; the function enforces the bearer itself. No Anthropic
# dependency — it ranks over already-computed image_tags.
[functions.daily-drop]
verify_jwt = false
